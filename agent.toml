# Authoring source for kee-hello. Run `npm run sync:entry` to regenerate entry.json. The platform also accepts this agent.toml directly in the upload zip.

"$comment" = "keemakr Marketplace submission for the kee-hello agent. This is the EntrySubmission the platform's registerEntry() ingests (see keemakr-core src/lib/marketplace/types.ts). Installing it for a tenant creates the 'hello' department + its single agent. It declares NO dependencies, so it installs instantly (no pending_deps step)."

slug = "kee-hello"
display_name = "Kee Hello"
description = "A tiny demo agent that greets and shouts text. The smallest possible keemakr Marketplace entry: one root agent, one tool, zero dependencies — instant install."
category = "utility"
author = "keemakr"
icon = "megaphone"
visibility = "public"

changelog = "Remove the Hunter.io find-email tool and its connection dependency — kee-hello is now a pure shout-only, zero-dependency demo."

dependencies = []

[runtime]
kind = "eve"
ref = "https://github.com/fsztpartners/kee-hello"
status = "declared"

[manifest.department]
key = "hello"
label = "Hello"
description = "A one-agent demo department that greets and shouts text."

[[manifest.agents]]
key = "shouter"
display_name = "Shouter"
role = "Greets and shouts text"
description = "Greets and shouts text via the shout tool. No connections, no database, no subagents."
config = { tools = ["shout"], max_input_chars = 280 }

[manifest.meta]
eve_root_agent = "agent/agent.ts"
tools = ["shout"]
